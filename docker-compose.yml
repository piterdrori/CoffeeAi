services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      API_KEY: ${API_KEY:-dev-api-key-change-me}
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 8080
      CLOUD_MIRROR_URL: ${CLOUD_MIRROR_URL:-}
      CLOUD_MIRROR_API_KEY: ${CLOUD_MIRROR_API_KEY:-}
    volumes:
      - edge_ai_data:/data
      - ./backend/data/releases:/data/releases:ro
    restart: unless-stopped

volumes:
  edge_ai_data:
